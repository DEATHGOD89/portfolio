<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bhupender - Full Stack Developer & AI Engineer</title>
    <meta name="description" content="Full Stack Developer and AI Engineer crafting exceptional digital experiences with modern technologies." />
    
    <!-- Preload Critical Resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    
    <style>
      body {
        font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      .mono {
        font-family: 'JetBrains Mono', monospace;
      }
      
      /* Smooth scrolling */
      html {
        scroll-behavior: smooth;
      }
      
      /* Custom cursor */
      .cursor {
        position: fixed;
        width: 20px;
        height: 20px;
        border: 2px solid #06b6d4;
        border-radius: 50%;
        pointer-events: none;
        z-index: 9999;
        transition: transform 0.1s ease;
        mix-blend-mode: difference;
      }
      
      /* Glassmorphism effect */
      .glass {
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
      
      /* Gradient animations */
      @keyframes gradientShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      
      .gradient-animate {
        background-size: 200% 200%;
        animation: gradientShift 3s ease infinite;
      }
      
      /* Floating animation */
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-20px); }
      }
      
      .float {
        animation: float 6s ease-in-out infinite;
      }
      
      /* Typing animation */
      @keyframes typing {
        from { width: 0; }
        to { width: 100%; }
      }
      
      @keyframes blink {
        50% { border-color: transparent; }
      }
      
      .typewriter {
        overflow: hidden;
        border-right: 3px solid #06b6d4;
        white-space: nowrap;
        animation: typing 3s steps(30, end), blink 0.75s step-end infinite;
      }
    </style>
  </head>
  <body class="bg-slate-900 text-white overflow-x-hidden">
    <!-- Custom Cursor -->
    <div class="cursor hidden lg:block"></div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <script>
      // Custom cursor
      const cursor = document.querySelector('.cursor');
      let mouseX = 0, mouseY = 0;
      
      document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        if (cursor) {
          cursor.style.left = mouseX - 10 + 'px';
          cursor.style.top = mouseY - 10 + 'px';
        }
      });
      
      // Cursor hover effects
      document.addEventListener('mouseenter', (e) => {
        if (e.target.matches('a, button')) {
          cursor?.style.setProperty('transform', 'scale(2)');
        }
      });
      
      document.addEventListener('mouseleave', (e) => {
        if (e.target.matches('a, button')) {
          cursor?.style.setProperty('transform', 'scale(1)');
        }
      });
    </script>
  </body>
</html>
